baseURL = 'http://example.org/'
copyright = "2026-{year} ShelfSeeck "
languageCode = 'zh-CN'
defaultContentLanguage = 'cn'
theme = 'enchanted-lowkey'
title = "SEECK's House"
enableRobotsTXT = true
summaryLength = 20
paginate = 6


[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = false
    noClasses = true
    noHl = false
    style = 'dracula'
    tabWidth = 4
